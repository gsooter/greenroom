<div class="gr-show">
  {% if show.image_url %}
  <a href="{{ show.url }}" style="text-decoration: none;">
    <img src="{{ show.image_url }}" alt="{{ show.headliner }}">
  </a>
  {% endif %}
  <p class="gr-show-title">
    <a href="{{ show.url }}" style="color: #1A2820; text-decoration: none;">
      {{ show.headliner }}
    </a>
  </p>
  <p class="gr-show-meta">{{ show.venue }} · {{ show.date_label }}</p>
</div>
